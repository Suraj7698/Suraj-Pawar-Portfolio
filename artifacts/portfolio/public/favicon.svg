<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2A1F6E"/>
      <stop offset="100%" stop-color="#4C3AE0"/>
    </linearGradient>
  </defs>

  <!-- Squircle background -->
  <rect x="0" y="0" width="512" height="512" rx="112" ry="112" fill="url(#bg)"/>

  <!-- Monogram: S and P sharing a single continuous stroke -->
  <g fill="none" stroke="#F6F4FF" stroke-width="54" stroke-linecap="round" stroke-linejoin="round">
    <!-- S -->
    <path d="M 232 146
             C 176 146, 146 172, 146 208
             C 146 246, 180 260, 220 266
             C 268 273, 300 292, 300 336
             C 300 376, 266 406, 208 406
             C 156 406, 122 384, 112 352"/>
  </g>

  <!-- P: vertical stem + bowl, positioned to interlock visually with the S -->
  <g fill="none" stroke="#F6F4FF" stroke-width="54" stroke-linecap="round" stroke-linejoin="round">
    <path d="M 340 146 L 340 406"/>
    <path d="M 340 146 C 402 146, 436 170, 436 216 C 436 262, 402 286, 340 286"/>
  </g>

  <!-- Accent: warm dot marking the counter of the P, the signature detail -->
  <circle cx="386" cy="216" r="18" fill="#FFB74A"/>
</svg>
